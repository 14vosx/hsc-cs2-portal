<section class="smoke-page">
  <app-section-header
    eyebrow="Angular shell inicial"
    title="API Smoke Test"
    description="Validação temporária da Static API v2 via Angular HttpClient."
  />

  @if (vm$ | async; as vm) {
    <div class="smoke-page__status-row">
      <app-status-badge
        [label]="vm.health.ok ? 'Health OK' : 'Health Falha'"
        [tone]="vm.health.ok ? 'success' : 'danger'"
      />
      <app-status-badge label="Static API v2" tone="neutral" />
    </div>

    <section class="smoke-page__grid" aria-label="Resumo da API">
      <app-metric-card
        label="Health"
        [value]="vm.health.ok ? 'OK' : 'Falha'"
        [tone]="vm.health.ok ? 'success' : 'danger'"
        hint="Status do contrato base"
      />

      <app-metric-card
        label="Ranking"
        [value]="vm.ranking.players.length + ' jogadores'"
        tone="ranking"
      />

      <app-metric-card
        label="Matches"
        [value]="vm.matches.matches.length + ' partidas'"
      />

      <app-metric-card
        label="Maps"
        [value]="vm.maps.maps.length + ' mapas'"
      />
    </section>

    <app-data-card eyebrow="Debug" title="JSON tecnico" meta="forkJoin snapshot">
      <pre>{{ vm | json }}</pre>
    </app-data-card>
  } @else {
    <p class="smoke-page__loading">Carregando contratos...</p>
  }
</section>
