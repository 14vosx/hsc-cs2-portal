<header class="portal-header">
  <div class="portal-header__inner">
    <div class="portal-header__brand" aria-label="HSC CS2">
      <span class="portal-header__mark">HSC</span>
      <div>
        <strong>HSC CS2</strong>
        <span>Temporada competitiva do clube</span>
      </div>
    </div>

    <nav class="portal-header__nav" aria-label="Navegação principal">
      @for (item of navItems; track item.label) {
        @if (item.path) {
          <a
            class="portal-header__nav-item"
            [routerLink]="item.path"
            routerLinkActive="portal-header__nav-item--active"
            [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          >
            {{ item.label }}
          </a>
        } @else {
          <span class="portal-header__nav-item portal-header__nav-item--disabled">
            {{ item.label }}
          </span>
        }
      }
    </nav>
  </div>
</header>
