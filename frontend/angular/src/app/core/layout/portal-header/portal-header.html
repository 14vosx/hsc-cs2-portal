<header class="portal-header">
  <div class="portal-header__inner">
    <div class="portal-header__brand" aria-label="HSC CS2 Portal">
      <span class="portal-header__mark" aria-hidden="true">
        <img src="brand/hsc-shield-primary-accent.webp" alt="" />
      </span>
    </div>

    <nav class="portal-header__nav" aria-label="Navegação principal">
      @for (item of navItems; track item.label) {
        @if (item.path) {
          <a
            class="portal-header__nav-item"
            [routerLink]="item.path"
            routerLinkActive="portal-header__nav-item--active"
            [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          >
            {{ item.label }}
          </a>
        } @else if (item.href) {
          <a class="portal-header__nav-item" [href]="item.href">
            {{ item.label }}
          </a>
        } @else {
          <span class="portal-header__nav-item portal-header__nav-item--disabled">
            {{ item.label }}
          </span>
        }
      }
    </nav>

    <div class="portal-header__secondary" aria-label="Informações do portal">
      <div>
        <span>Temporada ativa</span>
        <strong>CS2 HSC</strong>
      </div>
      <div>
        <span>Conta</span>
        <strong>em breve</strong>
      </div>
      <a routerLink="/api-smoke">Diagnóstico</a>
    </div>
  </div>
</header>
